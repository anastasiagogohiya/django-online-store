server {
    listen 80;
    server_name _;

    # Указываем DNS-резолвер Docker
    resolver 127.0.0.11 valid=10s;

    # Переменная для upstream (имя контейнера и порт)
    set $upstream_app "app:8000";

    # Статика и медиа
    location /static/ {
        alias /app/static_collected/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Все остальные запросы – на Gunicorn
    location / {
        proxy_pass http://$upstream_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


    client_max_body_size 10M;

    location /stub_status {
    stub_status;
    allow 127.0.0.1;
    allow 172.16.0.0/12;
    #allow 172.0.0.0/8; # Разрешаем доступ из docker-сети
    deny all;
    }
}