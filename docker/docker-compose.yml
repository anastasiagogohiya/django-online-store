services:

  # PostgreSQL - база данных в продакшне, в тестовой Sqlite
  db:
    image: postgres:15
    env_file:
      - ../megano/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U megano_user -d megano_prod"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - monitoring

  # Redis - для хранения очередей задач
  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - monitoring

  # Celery - асинхронные задачи
  celery:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      - CONTAINER_ROLE=celery
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../megano/.env
    volumes:
      - media_volume:/app/media
      - static_volume:/app/static_collected
    restart: unless-stopped
    networks:
      - monitoring

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../megano/.env
    volumes:
      - media_volume:/app/media
      - static_volume:/app/static_collected
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 90s
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      #- PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus-django

    restart: unless-stopped
    networks:
      - monitoring

  # Nginx - веб-сервер
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/static_collected
      - media_volume:/app/media
    ports:
      - "80:80"
    depends_on:
      app:
        condition: service_healthy  # иначе nginx не дожидается app
    restart: unless-stopped
    networks:
      - monitoring


  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"
    networks:
      - monitoring
    restart: unless-stopped


  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_LOG_LEVEL=error
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - monitoring
    restart: unless-stopped

  # Для метрики
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-megano_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgresspass}
      - POSTGRES_DB=${POSTGRES_DB:-megano_prod}
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-megano_user}:${POSTGRES_PASSWORD:-postgresspass}@db:5432/${POSTGRES_DB:-megano_prod}?sslmode=disable
    networks:
      - monitoring
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    environment:
      REDIS_ADDR: "redis://redis:6379"
    networks:
      - monitoring
    restart: unless-stopped

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-exporter
    command:
      - '-nginx.scrape-uri=http://nginx:80/stub_status'
    networks:
      - monitoring
    restart: unless-stopped

  celery-exporter:
    image: danihodovic/celery-exporter:latest
    container_name: celery-exporter
    command:
      - '--broker-url=redis://redis:6379/0'
    networks:
      - monitoring
    environment:
      - REDIS_URL=redis://redis:6379/0
    restart: unless-stopped


volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  grafana-storage:
  prometheus-data:

# Сеть для мониторинга
networks:
  monitoring:
    driver: bridge

